<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nature Glitch 母版連線診斷</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f0f2f5; text-align: center; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .status { padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .success { background: #e6fffa; color: #234e52; border: 1px solid #38b2ac; }
        .error { background: #fff5f5; color: #c53030; border: 1px solid #feb2b2; }
    </style>
</head>
<body>
    <div class="card">
        <h1>雲端母版：連線診斷</h1>
        <div id="status-box" class="status">正在從 GitHub 對接 Google...</div>
        <div id="data-display">等待雲端回應中...</div>
    </div>

    <script>
        // 你的正確 ID
        const ssID = '1j7quZPgHFltMpvnHJe-6WRb4sKJyBK0rRIQB4aG6K2Y';
        // 使用 Google Visualization API，這對 GitHub Pages 最穩定
        const url = `https://docs.google.com/spreadsheets/d/${ssID}/export?format=csv&gid=0`;
        fetch(url)
            .then(res => {
                if (!res.ok) throw new Error('Google 門沒開 (請確認共用權限為任何人)');
                return res.text();
            })
            .then(csvData => {
                document.getElementById('status-box').className = 'status success';
                document.getElementById('status-box').innerHTML = '✅ 連線成功！雲端大腦已接通。';
                
                const rows = csvData.split('\n');
                let html = '<ul style="text-align: left;">';
                for (let i = 1; i < Math.min(rows.length, 5); i++) {
                    const cleanText = rows[i].replace(/"/g, "");
                    if(cleanText) html += `<li>抓取資料：${cleanText.split(',')[2]}</li>`;
                }
                html += '</ul>';
                document.getElementById('data-display').innerHTML = html;
            })
            .catch(err => {
                document.getElementById('status-box').className = 'status error';
                document.getElementById('status-box').innerHTML = '❌ 讀取失敗：' + err.message;
            });
    </script>
</body>
</html>
