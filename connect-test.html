<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>母版連線診斷</title>
  <style>
    body{font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif;background:#f6f7fb;padding:24px}
    .card{max-width:680px;margin:0 auto;background:#fff;border-radius:14px;padding:22px;box-shadow:0 8px 30px rgba(0,0,0,.08)}
    .ok{background:#e9f8ef;color:#0f5132;border:1px solid #bfe5cc;padding:10px 12px;border-radius:10px;margin-top:14px;white-space:pre-wrap}
    .bad{background:#fdecea;color:#842029;border:1px solid #f5c2c7;padding:10px 12px;border-radius:10px;margin-top:14px;white-space:pre-wrap}
    code{background:#f1f3f5;padding:2px 6px;border-radius:6px}
  </style>
</head>
<body>
  <div class="card">
    <h2>雲端母版：連線診斷</h2>
    <div>測試 Apps Script 是否活著（ping）</div>
    <div id="box">連線中…</div>

    <hr style="margin:18px 0;border:none;border-top:1px solid #eee" />
    <div style="font-size:13px;color:#666">
      目前測試的後台：<br />
      <code id="u"></code>
    </div>
  </div>

<script>
  // ★把這裡換成你的 Apps Script Web App /exec
  const GAS_URL = "https://script.google.com/macros/s/AKfycby5EEI2YgAPL5YXRbqdedZ_eJf1VWU2ACNn861AqE4n6egJ1-A1a1wZBm9lZyinh_k/exec";

  document.getElementById("u").textContent = GAS_URL;

  (async () => {
    const box = document.getElementById("box");
    try {
      const r = await fetch(GAS_URL + "?action=ping", { cache: "no-store" });
      const t = await r.text();
      if (!r.ok) throw new Error("HTTP " + r.status + "\n" + t);
      box.className = "ok";
      box.textContent = "✅ 連線成功\n" + t;
    } catch (e) {
      box.className = "bad";
      box.textContent = "❌ 連線失敗\n" + (e && e.message ? e.message : e);
    }
  })();
</script>
</body>
</html>
